<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M30 30h40v40H30zM45 15v15M55 15v15M85 45h-15M85 55h-15M55 85V70M45 85V70M15 55h15M15 45h15%22 stroke=%22black%22 stroke-width=%226%22 fill=%22none%22 stroke-linecap=%22round%22/></svg>">
    <title>Ukázky AI - AI pro učitele</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/ukazky.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="../index.html" style="color:white; text-decoration:none;">AI pro učitele</a>
            </div>
            <div class="nav-right-section">
                <i class="fa-solid fa-diagram-project"></i>
            </div>
        </nav>
    </header>

    <main class="lesson-container">
        <div class="lesson-header cat-ukazka">
            <h1>
                <i class="fas fa-lightbulb" style="margin-right: 12px; color: #4dd0e1; opacity: 0.7;"></i>
                Ukázky použití AI v praxi
            </h1>
        </div>
<section class="lesson-content">
    <p>Inspirujte se hotovými prompty a postupy. Klikněte na kartu pro detaily a kopírování.</p>
    
    <div class="tab-menu cat-ukazka">
        <button class="tab-btn active" onclick="openTab(event, 'ukazka-tab1')">Obrázky</button>
        <button class="tab-btn" onclick="openTab(event, 'ukazka-tab2')">Gemy</button>
        <button class="tab-btn" onclick="openTab(event, 'ukazka-tab3')">AI v lavicích</button>
        <button class="tab-btn" onclick="openTab(event, 'ukazka-tab4')">Dynamika</button>
        <button class="tab-btn" onclick="openTab(event, 'ukazka-tab5')">NPI Desatero</button>
        <button class="tab-btn" onclick="openTab(event, 'ukazka-tab6')">Herní mód</button>
        <button class="tab-btn" onclick="openTab(event, 'ukazka-tab7')">NotebookLM</button>
    </div>

    <div id="ukazka-tab1" class="tab-content bg-ukazka active">
        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="ukazky-search" placeholder="Hledejte podle názvu nebo #hashtagu..." onkeyup="searchData()">
            </div>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterData('vše', event)">Vše</button>
            <button class="filter-btn" onclick="filterData('Biologie', event)">Biologie</button>
            <button class="filter-btn" onclick="filterData('Informatika', event)">Informatika</button>
        </div>    
        <div id="grid-obrazky" class="ukazky-grid"></div>
    </div>

    <div id="ukazka-tab2" class="tab-content bg-ukazka">
        <div id="grid-gemy" class="ukazky-grid"></div>
    </div>

    <div id="ukazka-tab3" class="tab-content bg-ukazka">
        <div id="grid-lavice" class="ukazky-grid"></div>
    </div>

    <div id="ukazka-tab4" class="tab-content bg-ukazka">
        <div id="grid-dynamika" class="ukazky-grid"></div>
    </div>

    <div id="ukazka-tab5" class="tab-content bg-ukazka">
        <div id="grid-npi" class="ukazky-grid"></div>
    </div>

    <div id="ukazka-tab6" class="tab-content bg-ukazka">
        <div id="grid-hry" class="ukazky-grid"></div>
    </div>

    <div id="ukazka-tab7" class="tab-content bg-ukazka">
        <div id="grid-notebook" class="ukazky-grid"></div>
    </div>
</section>

<div id="ukazka-modal" class="modal-ukazka">
    <div class="modal-content-ukazka">
        <span class="close-modal" onclick="closeUkazkaModal()">&times;</span>
        <div id="modal-body-ukazka">
            </div>
    </div>
</div>

    </main>

    <footer>
        <div class="footer-content">
            <span>&copy; 2026 Generováno AI modelem Gemini 3 Flash</span>
            <span class="separator">|</span>
            <span>Správce webu: Mgr. Petra Jurtíková</span>
        </div>
    </footer>


<script src="../js/data/obrazky.js"></script>
<script src="../js/data/gemy.js"></script>
<script src="../js/data/dynamika.js"></script>
<script src="../js/ukazky.js"></script>
<script src="../js/script.js"></script>
</body>
</html>
